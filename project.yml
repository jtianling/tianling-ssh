name: tianling-ssh
options:
  bundleIdPrefix: com.tianlingtech
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.7.0"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"
schemes:
  TLSSH:
    build:
      targets:
        TLSSH: all
        TLSSHTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TLSSHTests
targets:
  TLSSH:
    type: application
    platform: iOS
    sources:
      - App
      - Assets.xcassets
      - Connection
      - Session
      - SSH
      - Terminal
      - path: Resources/Fonts
        buildPhase: resources
    dependencies:
      - package: Citadel
      - package: SwiftTerm
    info:
      path: App/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - HackNerdFontMono-Regular.ttf
          - HackNerdFontMono-Bold.ttf
          - HackNerdFontMono-Italic.ttf
          - HackNerdFontMono-BoldItalic.ttf
    settings:
      base:
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        DEVELOPMENT_TEAM: VF5HPZNKTM
        PRODUCT_BUNDLE_IDENTIFIER: com.tianlingtech.tlssh
        PRODUCT_NAME: TL-SSH
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  TLSSHTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TLSSHTests
    dependencies:
      - target: TLSSH
    settings:
      base:
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: VF5HPZNKTM
        PRODUCT_BUNDLE_IDENTIFIER: com.tianlingtech.tlssh.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TL-SSH.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TL-SSH"
